name: Deploy to staging
on:
  push:
    branches:
      - "main"
jobs:
  redeploy_frontend:
    name: Deploying everything to staging cluster
    runs-on: ubuntu-latest
    steps:
      - name: SSH into server and deploy
        run: |
          echo "${{secrets.SSH_PVT_KEY}}" > ~/file.pem
          chmod 600 ~/file.pem
          ssh -i ~/file.pem -o StrictHostKeyChecking=no ubuntu@13.235.79.118 << 'EOF'
            cd turborepo-deploy-ci-cd
            git pull origin main
            bun install
            bun run build
            pm2 restart all
          EOF